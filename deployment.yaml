apiVersion: apps/v1
kind: Deployment ## It is must to have this only bcz this is a kube-manifest files and kubernetes uses it internally
metadata:
  name: kubernetes-test-app ## our app name
spec:
  replicas: 2 # Number of pods, min(pods) = 2 (must), bcz ek down hoga toh another will be up and running
  selector:
    matchLabels:
      app: kubernetes-test-app
  template:
    metadata:
      labels:
        app: kubernetes-test-app
    spec:
      containers:
      - name: kubernetes-test-app
        image: kubernetes-test-app:latest ## image name : tag
        imagePullPolicy: Never # Tell Kubernetes not to pull from a registry
        # image: amitgour3/kubernetes-test-app:latest     # this I've commented out bcz above I set never. 
        resources:
          limits:
            memory: "64Mi"
            cpu: "200m" ## means 200 milli core CPU, eg. if we have 2 core CPU, then one fifth of one core is 200m core CPU
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-test-app
spec:
  selector:
    app: kubernetes-test-app
  ports:
  - port: 8080
    targetPort: 5000
